
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Worker Registration - ServiceHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="login-container">

    <div class="register-card">

        <div class="text-center mb-4">

            <i class="fas fa-tools fa-4x text-primary"></i>

            <h2 class="mt-3">
                Worker Registration
            </h2>

            <p class="text-muted">
                Register as a Service Professional
            </p>

        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}

        {% for category, message in messages %}

        <div class="alert alert-{{ category }}">
            {{ message }}
        </div>

        {% endfor %}

        {% endif %}
        {% endwith %}

        <form method="POST" action="/worker-register">

            <div class="mb-3">
                <label class="form-label">Full Name</label>

                <input type="text"
                       name="name"
                       class="form-control"
                       placeholder="Enter Full Name"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>

                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="Enter Email Address"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>

                <input type="text"
                       name="phone"
                       class="form-control"
                       placeholder="Enter Phone Number"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>

                <textarea name="address"
                          class="form-control"
                          rows="3"
                          placeholder="Enter Address"
                          required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Profession</label>

                <select name="profession"
                        class="form-select"
                        required>

                    <option value="">
                        Select Profession
                    </option>

                    <option value="AC Technician">
                        AC Technician
                    </option>

                    <option value="Electrician">
                        Electrician
                    </option>

                    <option value="Plumber">
                        Plumber
                    </option>

                    <option value="Painter">
                        Painter
                    </option>

                    <option value="Carpenter">
                        Carpenter
                    </option>

                    <option value="Cleaner">
                        Cleaner
                    </option>

                    <option value="RO Technician">
                        RO Technician
                    </option>

                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Experience</label>

                <input type="text"
                       name="experience"
                       class="form-control"
                       placeholder="Example: 3 Years"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter Password"
                       required>
            </div>

            <button type="submit"
                    class="btn btn-primary w-100">

                Register as Worker

            </button>

        </form>

        <div class="text-center mt-4">

            <p>

                Already have an account?

                <a href="/login">
                    Login Here
                </a>

            </p>

        </div>

        <hr>

        <div class="text-center">

            <a href="/"
               class="btn btn-outline-secondary">

                Back To Home

            </a>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
