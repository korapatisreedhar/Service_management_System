<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Service</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            ServiceHub
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/services">
                        Services
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/my-bookings">
                        My Bookings
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-danger" href="/logout">
                        Logout
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- Header -->

<section class="bg-primary text-white py-5">

    <div class="container text-center">

        <h1>Book Your Service</h1>

        <p>
            Fill in the details below to schedule a service
        </p>

    </div>

</section>

<!-- Booking Form -->

<div class="container my-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <h3 class="text-center mb-4">
                        Service Booking Form
                    </h3>

                    <form method="POST"
                          action="/book-service">

                        <!-- Service -->

                        <div class="mb-3">

                            <label class="form-label">
                                Service Name
                            </label>

                            <select class="form-select"
                                    name="service_name"
                                    required>

                                <option value="">
                                    Select Service
                                </option>

                                <option>Home Cleaning</option>
                                <option>Deep Cleaning</option>
                                <option>Electrician</option>
                                <option>Plumber</option>
                                <option>AC Repair</option>
                                <option>AC Installation</option>
                                <option>Refrigerator Repair</option>
                                <option>Washing Machine Repair</option>
                                <option>RO Water Purifier Service</option>
                                <option>Pest Control</option>
                                <option>Painting</option>
                                <option>Carpentry</option>
                                <option>Bathroom Cleaning</option>
                                <option>Kitchen Cleaning</option>
                                <option>Salon at Home</option>
                                <option>Spa at Home</option>

                            </select>

                        </div>

                        <!-- Phone -->

                        <div class="mb-3">

                            <label class="form-label">
                                Mobile Number
                            </label>

                            <input type="tel"
                                   name="phone"
                                   class="form-control"
                                   placeholder="Enter Mobile Number"
                                   required>

                        </div>

                        <!-- Address -->

                        <div class="mb-3">

                            <label class="form-label">
                                Service Address
                            </label>

                            <textarea class="form-control"
                                      rows="3"
                                      name="address"
                                      placeholder="Enter Address"
                                      required></textarea>

                        </div>

                        <!-- Date -->

                        <div class="mb-3">

                            <label class="form-label">
                                Preferred Date
                            </label>

                            <input type="date"
                                   name="booking_date"
                                   class="form-control"
                                   required>

                        </div>

                        <!-- Problem Description -->

                        <div class="mb-3">

                            <label class="form-label">
                                Problem Description
                            </label>

                            <textarea class="form-control"
                                      rows="4"
                                      name="description"
                                      placeholder="Describe your issue"></textarea>

                        </div>

                        <!-- Submit -->

                        <button type="submit"
                                class="btn btn-success w-100">

                            <i class="fab fa-whatsapp"></i>

                            Book Service

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Footer -->

<footer class="bg-dark text-white text-center py-3">

    <h5>ServiceHub</h5>

    <p>Your Trusted Home Service Partner</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
